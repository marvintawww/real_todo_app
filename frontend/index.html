<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Задачи</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

  <!-- ── Auth ─────────────────────────────────────────── -->
  <div id="auth-container" class="container hidden">

    <div id="login-form" class="auth-form">
      <div class="auth-logo">
        <div class="auth-logo-mark">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
          </svg>
        </div>
      </div>
      <h1>Вход</h1>
      <form onsubmit="return handleLogin(event)">
        <div class="form-group">
          <label for="login-username">Логин</label>
          <input type="text" id="login-username" name="login" placeholder="Введите логин" required>
        </div>
        <div class="form-group">
          <label for="login-password">Пароль</label>
          <input type="password" id="login-password" name="password" placeholder="Введите пароль" required>
        </div>
        <button type="submit" class="btn btn-primary">Войти</button>
        <p class="form-switch">Нет аккаунта? <a href="#" onclick="showRegister()">Зарегистрироваться</a></p>
      </form>
    </div>

    <div id="register-form" class="auth-form hidden">
      <div class="auth-logo">
        <div class="auth-logo-mark">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
          </svg>
        </div>
      </div>
      <h1>Регистрация</h1>
      <form onsubmit="return handleRegister(event)">
        <div class="form-group">
          <label for="register-username">Логин</label>
          <input type="text" id="register-username" name="login" placeholder="Придумайте логин" required>
        </div>
        <div class="form-group">
          <label for="register-password">Пароль</label>
          <input type="password" id="register-password" name="password" placeholder="Придумайте пароль" required>
        </div>
        <button type="submit" class="btn btn-primary">Создать аккаунт</button>
        <p class="form-switch">Уже есть аккаунт? <a href="#" onclick="showLogin()">Войти</a></p>
      </form>
    </div>

  </div>

  <!-- ── Main App ───────────────────────────────────────── -->
  <div id="main-container" class="container hidden">

    <!-- Header -->
    <header class="header">
      <div class="header-brand">
        <div class="header-brand-mark">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
          </svg>
        </div>
        <h1>Задачи</h1>
      </div>
      <div class="header-actions">
        <span id="user-greeting"></span>
        <button class="theme-toggle" onclick="toggleTheme()" title="Сменить тему" id="theme-btn">
          <!-- sun icon (shown in dark mode) -->
          <svg id="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <!-- moon icon (shown in light mode) -->
          <svg id="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/>
          </svg>
        </button>
        <button onclick="showProfile()" class="btn btn-secondary btn-small">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
          Профиль
        </button>
        <button onclick="handleLogout()" class="btn btn-danger btn-small">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Выйти
        </button>
      </div>
    </header>

    <!-- Navigation -->
    <nav class="nav">
      <button class="nav-btn active" onclick="showSection('tasks')">Задачи</button>
      <button class="nav-btn" onclick="showSection('types')">Типы задач</button>
    </nav>

    <!-- Tasks Section -->
    <section id="tasks-section">

      <!-- Week Date Picker -->
      <div class="week-picker">
        <div class="week-picker-header">
          <span class="week-label" id="week-label"></span>
          <div class="week-header-right">
            <button class="week-today-btn" onclick="jumpToToday()" id="week-today-btn">Сегодня</button>
            <button class="week-nav-btn" id="week-prev" onclick="shiftWeek(-1)">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <button class="week-nav-btn" id="week-next" onclick="shiftWeek(1)">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>
        </div>
        <div class="week-days" id="week-days"></div>
      </div>

      <div class="filters">
        <input type="text" id="search-input" placeholder="Поиск задач..." oninput="debouncedSearch()">
        <select id="filter-completed" onchange="applyFilters()">
          <option value="">Все задачи</option>
          <option value="true">Выполненные</option>
          <option value="false">Невыполненные</option>
        </select>
        <input type="date" id="filter-date" style="display:none">
        <button onclick="clearFilters()" class="btn btn-ghost btn-small">Сбросить</button>
      </div>

      <div class="section-toolbar">
        <span class="tasks-count" id="tasks-count"></span>
        <button onclick="showCreateTaskModal()" class="btn btn-primary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Новая задача
        </button>
      </div>

      <div id="tasks-list" class="tasks-grid"></div>
    </section>

    <!-- Types Section -->
    <section id="types-section" class="hidden">
      <div class="type-manager">
        <h2>Управление типами</h2>
        <form onsubmit="return handleCreateType(event)" class="inline-form">
          <input type="text" id="type-title" placeholder="Название нового типа" required>
          <button type="submit" class="btn btn-primary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Добавить
          </button>
        </form>
        <div id="types-list" class="types-grid"></div>
      </div>
    </section>

    <!-- Profile Section -->
    <section id="profile-section" class="hidden">
      <div class="profile-card">
        <h2>Профиль</h2>
        <div class="profile-row">
          <span class="profile-label">ID</span>
          <span class="profile-value" id="profile-id"></span>
        </div>
        <div class="profile-row">
          <span class="profile-label">Логин</span>
          <span class="profile-value" id="profile-login"></span>
        </div>
      </div>
    </section>

  </div>

  <!-- ── Modals ─────────────────────────────────────────── -->

  <!-- Task Modal -->
  <div id="task-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="task-modal-title">Создать задачу</h2>
        <span class="close" onclick="closeTaskModal()">&times;</span>
      </div>
      <form onsubmit="return handleTaskSubmit(event)">
        <input type="hidden" id="task-id">
        <div class="form-group">
          <label for="task-title">Название</label>
          <input type="text" id="task-title" placeholder="Что нужно сделать?" required>
        </div>
        <div class="form-group">
          <label for="task-description">Описание</label>
          <textarea id="task-description" placeholder="Подробности (необязательно)"></textarea>
        </div>
        <div class="form-group">
          <label for="task-date">Дата выполнения</label>
          <input type="date" id="task-date">
        </div>
        <div class="form-group">
          <label for="task-type-select">Тип задачи</label>
          <select id="task-type-select" required></select>
        </div>
        <button type="submit" class="btn btn-primary">Сохранить задачу</button>
      </form>
    </div>
  </div>

  <!-- Profile Modal -->
  <div id="profile-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Профиль</h2>
        <span class="close" onclick="closeProfileModal()">&times;</span>
      </div>
      <div class="profile-row">
        <span class="profile-label">ID</span>
        <span class="profile-value" id="modal-profile-id"></span>
      </div>
      <div class="profile-row">
        <span class="profile-label">Логин</span>
        <span class="profile-value" id="modal-profile-login"></span>
      </div>
    </div>
  </div>

</div>

<!-- Toasts -->
<div id="toast-container"></div>

<script>
  // ── Theme ───────────────────────────────────────────────
  (function() {
    const saved = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
    updateThemeIcons(saved);
  })();

  function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    updateThemeIcons(next);
  }

  function updateThemeIcons(theme) {
    const sun  = document.getElementById('icon-sun');
    const moon = document.getElementById('icon-moon');
    if (!sun || !moon) return;
    sun.style.display  = theme === 'dark'  ? 'block' : 'none';
    moon.style.display = theme === 'light' ? 'block' : 'none';
  }

  // ── Week Date Picker ────────────────────────────────────
  const DAY_NAMES = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
  const MONTH_NAMES = ['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];
  window._weekOffset = 0;
  window._selectedDate = null;

  function getWeekDates(offset) {
    const now = new Date();
    const dayOfWeek = (now.getDay() + 6) % 7;
    const monday = new Date(now);
    monday.setDate(now.getDate() - dayOfWeek + offset * 7);
    monday.setHours(0,0,0,0);
    return Array.from({length: 7}, (_, i) => {
      const d = new Date(monday);
      d.setDate(monday.getDate() + i);
      return d;
    });
  }

  function toYMD(d) {
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function renderWeekPicker() {
    const days = getWeekDates(window._weekOffset);
    const today = toYMD(new Date());
    const first = days[0], last = days[6];

    const cap = s => s.charAt(0).toUpperCase() + s.slice(1);
    let label;
    if (first.getMonth() === last.getMonth()) {
      label = cap(MONTH_NAMES[first.getMonth()]) + ' ' + first.getFullYear();
    } else if (first.getFullYear() === last.getFullYear()) {
      label = cap(MONTH_NAMES[first.getMonth()]) + ' — ' + cap(MONTH_NAMES[last.getMonth()]) + ' ' + last.getFullYear();
    } else {
      label = cap(MONTH_NAMES[first.getMonth()]) + ' ' + first.getFullYear() + ' — ' + cap(MONTH_NAMES[last.getMonth()]) + ' ' + last.getFullYear();
    }
    document.getElementById('week-label').textContent = label;

    const todayInView = days.some(d => toYMD(d) === today);
    const todayBtn = document.getElementById('week-today-btn');
    // visible only when current week is NOT in view
    todayBtn.classList.toggle('visible', !todayInView);

    const container = document.getElementById('week-days');
    container.innerHTML = days.map(d => {
      const ymd = toYMD(d);
      const isToday = todayInView && ymd === today;
      const isSelected = ymd === window._selectedDate;
      let cls = 'week-day';
      if (isToday) cls += ' today';
      if (isSelected) cls += ' selected';
      return '<button class="' + cls + '" onclick="selectWeekDay(\'' + ymd + '\')">' +
        '<span class="week-day-name">' + DAY_NAMES[d.getDay()] + '</span>' +
        '<span class="week-day-num-wrap"><span class="week-day-num">' + d.getDate() + '</span></span>' +
        '</button>';
    }).join('');
  }

  window.shiftWeek = function(dir) {
    window._weekOffset += dir;
    renderWeekPicker();
  };
  window.jumpToToday = function() {
    window._weekOffset = 0;
    renderWeekPicker();
  };
  window.selectWeekDay = function(ymd) {
    window._selectedDate = window._selectedDate === ymd ? null : ymd;
    const hiddenDate = document.getElementById('filter-date');
    if (hiddenDate) hiddenDate.value = window._selectedDate || '';
    renderWeekPicker();
    if (typeof applyFilters === 'function') applyFilters();
  };
  document.addEventListener('DOMContentLoaded', () => {
    renderWeekPicker();
    // Patch clearFilters to also reset week picker selection
    const _origClear = window.clearFilters;
    window.clearFilters = function() {
      window._selectedDate = null;
      renderWeekPicker();
      if (typeof _origClear === 'function') _origClear();
    };
  });

  // ── Toast override for icons ────────────────────────────
  window._showToast = function(message, type = 'info') {
    const container = document.getElementById('toast-container');
    const icons = { success: '✓', error: '✕', info: 'i' };
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `<span class="toast-icon">${icons[type] || 'i'}</span><span>${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3500);
  };
</script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
